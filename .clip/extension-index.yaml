extensions:
  - name: clip-context-mode
    dir: extensions/context-mode
    description: Index large clip target output through upstream context-mode MCP.
  - name: skills
    dir: extensions/skills
    description: Manage reusable prompt-template skills and install them into agents.
  - name: recap
    dir: extensions/recap
    description: Query and manage stored tacit knowledge for clip targets and bundles.
  - name: sanitizer
    dir: extensions/sanitizer
    description: Redact sensitive-looking output and warn on prompt-injection text.
  - name: history
    dir: extensions/history
    description: Record and query local clip command history.

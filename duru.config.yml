# duru plugin install https://github.com/ori-kim/cli-proxy 로 설치 가능
plugins:
  - path: plugins/context-mode
    name: context-mode
    description: Capture and search command invocation history
    entry: src/index.ts
  - path: plugins/history
    name: history
    description: Daily-partitioned invocation log with rerun
    entry: src/index.ts

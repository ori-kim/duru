name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            asset: duru-darwin-arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Inject version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const f=require('fs'); const p=JSON.parse(f.readFileSync('apps/cli/package.json','utf8')); p.version='${VERSION}'; f.writeFileSync('apps/cli/package.json', JSON.stringify(p,null,2)+'\n')"
      - run: bun build --compile --target=${{ matrix.target }} ./apps/cli/src/main.ts --outfile=${{ matrix.asset }}
      - run: codesign --force --sign - ${{ matrix.asset }}
      - run: codesign -v ${{ matrix.asset }}
      - run: shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
          generate_release_notes: true

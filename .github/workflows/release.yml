name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            asset: clip-darwin-arm64
            runner: macos-14
          - target: bun-darwin-x64
            asset: clip-darwin-x64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - run: bun build --compile --target=${{ matrix.target }} ./src/clip.ts --outfile=${{ matrix.asset }}
      - run: codesign --force --sign - ${{ matrix.asset }}
      - run: shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
          generate_release_notes: true
